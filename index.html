<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Surprise for Ouan</title>
    <style>
        /* --- CSS: ส่วนตกแต่งให้สวยงาม --- */
        
        /* นำเข้า Font สวยๆ จาก Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');

        :root {
            --bg-color: #fdf2f8; /* สีชมพูอ่อนมากๆ ผ่อนคลาย */
            --envelope-color: #f472b6; /* สีชมพูหลัก */
            --envelope-dark: #db2777; /* สีชมพูเข้ม */
            --text-color: #831843; /* สีตัวอักษรชมพูเข้มมาก */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Sarabun', sans-serif; /* ใช้ Font ที่ดูดีขึ้น */
            overflow: hidden;
            perspective: 1000px; /* เพิ่มมิติให้การหมุน */
        }

        .container {
            position: relative;
            text-align: center;
            cursor: pointer;
        }

        /* --- ซองจดหมายดีไซน์ใหม่ --- */
        .envelope-wrapper {
            position: relative;
            width: 280px; /* ขยายขนาด */
            height: 180px;
            background-color: var(--envelope-color);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px); /* เลื่อนขึ้นเล็กน้อยเวลามีเมาส์ชี้ */
        }

        /* ฝาพับซองจดหมาย */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid var(--envelope-dark);
            border-radius: 8px 8px 0 0;
            transform-origin: top;
            transition: transform 0.6s ease-in-out, z-index 0.3s;
            z-index: 2;
        }

        /* ส่วนหน้าของซองจดหมายที่ซ้อนทับ */
        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid var(--envelope-color);
            border-right: 140px solid var(--envelope-color);
            border-top: 90px solid transparent; /* ปรับให้ดูนูนขึ้น */
            border-bottom: 90px solid var(--envelope-color);
            border-radius: 0 0 8px 8px;
            z-index: 1;
        }

        /* --- กระดาษจดหมายด้านใน --- */
        .letter {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 80%;
            background: white;
            border-radius: 4px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.6s ease-in-out, opacity 0.4s;
            z-index: 0;
            opacity: 0;
            text-align: left;
            color: var(--text-color);
        }

        .letter-content {
            font-size: 16px;
            line-height: 1.6;
        }

        .letter-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        /* --- สเตตัสเมื่อซองจดหมายถูกเปิด --- */
        .container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0; /* เอาฝาไปไว้หลังกระดาษ */
        }

        .container.open .letter {
            transform: translate(-50%, -100px); /* เลื่อนกระดาษขึ้นมา */
            opacity: 1;
            z-index: 2; /* เอากระดาษมาไว้หน้าสุด */
        }

        /* --- คำเชิญชวน --- */
        .instruction {
            margin-top: 30px;
            color: var(--text-color);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* --- สไตล์หัวใจลอยๆ (สวยกว่าเดิม) --- */
        .heart {
            position: absolute;
            color: #ec4899; /* สีชมพูเข้มสะใจ */
            user-select: none;
            pointer-events: none;
            animation: moveUpAndFade 4s linear forwards;
            opacity: 0;
        }

        @keyframes moveUpAndFade {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="container" id="surpriseContainer">
        <div class="envelope-wrapper">
            <div class="envelope-flap"></div>
            <div class="letter">
                <div class="letter-content">
                    <div class="letter-title">ถึง อ้วน... ❤️</div>
                    <p>
                        ก็นั่นแหละ... แค่อยากจะบอกว่า<br>
                        ดีใจนะที่มีอ้วนอยู่ด้วยกันแบบนี้<br>
                        ขอบคุณนะที่เลือกรักเค้านะ<br>
                        <br>
                        <strong>รักอ้วนที่สุดในโลกเลย!</strong>
                    </p>
                </div>
            </div>
            <div class="envelope-front"></div>
        </div>
        <div class="instruction">คลิกที่ซองจดหมายสิ! ✨</div>
    </div>

    <script>
        // --- JavaScript: เพิ่มลูกเล่นและความต่อเนื่อง ---
        
        const container = document.getElementById('surpriseContainer');
        const instruction = document.querySelector('.instruction');
        let heartsInterval;

        container.addEventListener('click', function() {
            // สลับ Class เพื่อเปิด/ปิดซองจดหมาย
            this.classList.toggle('open');

            if(this.classList.contains('open')) {
                // ถ้าเปิดซอง: ซ่อนคำแนะนำ และเริ่มสร้างหัวใจ
                instruction.style.opacity = '0';
                instruction.style.transition = '0.3s';
                
                // สร้างหัวใจทันที 5 ดวง
                for(let i=0; i<5; i++) {
                    createHeart();
                }
                
                // และสร้างต่อเรื่อยๆ ทุกๆ 0.4 วินาที
                heartsInterval = setInterval(createHeart, 400);
            } else {
                // ถ้าปิดซอง: แสดงคำแนะนำคืน และหยุดสร้างหัวใจ
                instruction.style.opacity = '1';
                clearInterval(heartsInterval);
            }
        });

        // ฟังก์ชันสร้างหัวใจ (ปรับปรุงให้สวยขึ้นและกระจายตัวดีขึ้น)
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // สุ่มเลือกไอคอนหัวใจหลายๆ แบบ
            const heartTypes = ['❤️', '💖', '💗', '💕'];
            heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            // สุ่มตำแหน่งเริ่มต้น (กระจายเต็มหน้าจอ)
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '-50px'; // เริ่มจากล่างจอ
            
            // สุ่มขนาด (ให้ดูมีมิติ)
            const size = Math.random() * 20 + 15 + 'px';
            heart.style.fontSize = size;
            
            // สุ่มระยะเวลา Animation
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
            
            document.body.appendChild(heart);

            // ลบ Element เมื่อจบ Animation เพื่อไม่ให้เครื่องค้าง
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
    </script>
</body>
</html>
