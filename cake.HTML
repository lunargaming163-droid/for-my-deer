<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Special One</title>
    <style>
        /* CSS: ตกแต่งหน้าตา */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffcad4; /* สีชมพูอ่อน */
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: pointer;
        }

        /* รูปซองจดหมาย */
        .envelope {
            position: relative;
            width: 200px;
            height: 140px;
            background-color: #f08080;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            margin: 0 auto;
            transition: 0.5s;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 100px solid #f4978e;
            transition: 0.5s;
            transform-origin: top;
        }

        /* เมื่อเอาเมาส์วาง หรือคลิก (ใช้ Class ช่วย) */
        .container.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* ข้อความด้านใน */
        .message {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            background: white;
            padding: 10px;
            font-size: 14px;
            color: #d63384;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.5s;
            z-index: -1;
            opacity: 0;
        }

        .container.open .message {
            top: -80px;
            opacity: 1;
            z-index: 2;
        }

        /* สไตล์หัวใจลอยๆ */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            animation: moveUp 3s linear forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        h2 {
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container" onclick="openSurprise(this)">
        <div class="envelope">
            <div class="message">
                <strong>ถึงที่รัก... ❤️</strong><br>
                ขอบคุณที่อยู่ข้างกันนะ<br>
                รักคุณที่สุดในโลกเลย!
            </div>
        </div>
        <h2>คลิกที่ซองจดหมายสิ! ✨</h2>
    </div>

    <script>
        // JavaScript: เพิ่มลูกเล่น
        function openSurprise(element) {
            // เปิดซองจดหมาย
            element.classList.toggle('open');

            // สร้างหัวใจลอยขึ้นมาเรื่อยๆ
            if(element.classList.contains('open')) {
                setInterval(createHeart, 300);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
            
            document.body.appendChild(heart);

            // ลบ Element เมื่อจบ Animation เพื่อไม่ให้เครื่องค้าง
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
